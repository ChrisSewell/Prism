# coturn configuration — adapt to your environment
# See https://github.com/coturn/coturn/wiki/turnserver for all options

listening-port=3478
tls-listening-port=5349

# Relay port range — match docker-compose port mapping
min-port=49152
max-port=49200

# The coturn Docker image auto-detects the public IP via detect-external-ip.
# Do NOT set external-ip here when using the Docker image — it conflicts with
# the entrypoint's auto-detection. Override via docker-compose command instead:
#   command: ["--external-ip=YOUR_PUBLIC_IP"]

# Authentication — use-auth-secret for short-lived credentials
use-auth-secret
static-auth-secret=CHANGE_ME_TO_A_RANDOM_SECRET

realm=yourdomain.com

# Logging — avoid verbose in production
log-file=stdout
no-cli

# Security
no-multicast-peers
no-loopback-peers

# Fingerprinting
fingerprint
